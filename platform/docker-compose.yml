version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reading_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: reading_platform.settings.production
      DB_HOST: db
      DB_NAME: reading_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py loaddata gamification/fixtures/badges.json gamification/fixtures/quests.json &&
             gunicorn reading_platform.wsgi --workers 2 --bind 0.0.0.0:8000 --log-file -"

volumes:
  postgres_data:
