{% extends 'base.html' %}
{% block title %}Register – Reading Quest{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>📚 Reading Quest</h1>
    <h2>Create Account</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
